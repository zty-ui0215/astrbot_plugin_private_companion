name: astrbot_plugin_private_companion
display_name: 我会永远陪着你
author: menglimi
author_url: https://github.com/menglimi
description: astrbot_plugin_private_companion 是面向 AstrBot 的人格连续性、关系识别与主动行为编排插件。它把生活状态、日程细化、梦境日记、长期创作、重要日期、私聊关系、群聊观察、QQ 关系网、屏幕观察日记、BiliBot/SDGen 等可选外部动作、模型 Provider 和扩展页管理组织成一套持续陪伴体验。
desc: 为 AstrBot 提供人格连续性、私聊/群聊陪伴、关系识别、主动行为、长期创作和可视化管理的陪伴编排插件。
repo: https://github.com/menglimi/astrbot_plugin_private_companion
category: AI 增强
tags:
  - 陪伴
  - 长期记忆
  - 主动行为
  - 群聊观察
  - 可视化管理
help: |
  私聊发送：
  - 陪伴 状态
  - 陪伴 查看主动判定
  - 陪伴 重置插件
  - 陪伴 增添状态 <状态描述>[|持续小时]
  - 陪伴 查看今日日程
  - 陪伴 重置日程
  - 陪伴 当前细化
  - 陪伴 重置细化
  - 陪伴 能力列表
  - 陪伴 查看提示词 日程|细化|主动|回复注入
  - 陪伴 生成状态
  - 陪伴 梦境
  - 陪伴 梦境碎片
  - 陪伴 画像
  - 陪伴 记忆
  - 陪伴 表达学习
  - 陪伴 气氛
  - 陪伴 片段
  - 陪伴 长期记忆
  - 陪伴 日记
  - 陪伴 生成日记
  - 陪伴 日期列表
  - 陪伴 日期添加 <标题> <YYYY-MM-DD或MM-DD> [备注]
  - 陪伴 日期删除 <标题关键词>
  - 陪伴 可做事项
  - 陪伴 昵称 <称呼>
  - 陪伴 语气 温柔|活泼|工作
  - 陪伴 清空记忆

  群聊发送：
  - 陪伴群 状态
  - 陪伴群 黑话
  - 陪伴群 群友
  - 陪伴群 话题
  - 陪伴群 片段
  - 陪伴群 插话反馈
  - 陪伴群 关系网
  - 陪伴群 开启
  - 陪伴群 关闭

  本插件不只限于私聊。私聊陪伴默认开启；配置页 target_user_ids 里的 QQ 会自动预热主动消息。群聊陪伴支持白名单/黑名单模式,默认白名单,不会主动抢话。插件遵守每日上限、最小间隔、免打扰时间、群聊插话间隔和主动生图额度。看屏幕、生图、戳一戳、语音、QQ 状态同步、B 站 Bot、SDGen 等联动能力都是可选项,缺失时会自动跳过或回退。
version: 3.5.0
support_platforms:
  - aiocqhttp
astrbot_version: ">=4.22.0"
