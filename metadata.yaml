name: astrbot_plugin_private_companion
display_name: 我会永远陪着你
author: menglimi
description: astrbot_plugin_private_companion 是面向 AstrBot 私聊场景的主动陪伴插件。它会让 bot 拥有连续拟人状态、生活日程、当前时段细化、梦境、日记、重要日期和低频主动消息,更像一个有自己生活节奏的私聊伙伴。
desc: 让 Bot 拥有连续状态、生活日程、梦境日记与自然主动分享能力的私聊陪伴插件。
help: |
  私聊发送：
  - 陪伴 状态
  - 陪伴 查看主动判定
  - 陪伴 重置插件
  - 陪伴 增添状态 <状态描述>[|持续小时]
  - 陪伴 查看今日日程
  - 陪伴 重置日程
  - 陪伴 当前细化
  - 陪伴 重置细化
  - 陪伴 能力列表
  - 陪伴 查看提示词 日程|细化|主动|回复注入
  - 陪伴 完整测试
  - 陪伴 结束完整测试
  - 陪伴模拟唤醒 <想模拟的用户消息>
  - 陪伴 生成状态
  - 陪伴 梦境
  - 陪伴 梦境碎片
  - 陪伴 画像
  - 陪伴 日记
  - 陪伴 生成日记
  - 陪伴 日期列表
  - 陪伴 日期添加 <标题> <YYYY-MM-DD或MM-DD> [备注]
  - 陪伴 日期删除 <标题关键词>
  - 陪伴 可做事项
  - 陪伴 昵称 <称呼>
  - 陪伴 语气 温柔|活泼|工作
  - 陪伴 清空记忆

  私聊陪伴默认开启；配置页 target_user_ids 里的 QQ 会自动预热主动消息。插件遵守每日上限、最小间隔、免打扰时间和主动生图额度。看屏幕、生图、戳一戳、语音、QQ 状态同步等联动能力都是可选项,缺失时会自动跳过或回退。
version: 1.1.0
support_platforms:
  - aiocqhttp
astrbot_version: ">=4.22.0"
